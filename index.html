<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brew Bliss | Beautiful, Delicious Coffee</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --font-body: 'Inter', sans-serif;
      --font-display: 'Playfair Display', serif;
      --pink: #F472B6;
      --pink-light: #FBCFE8;
      --pink-dark: #EC4899;
      --rose: #FB7185;
      --cream: #FFF5F0;
      --deep-bg: #1a0a10;
    }

    * {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-body);
      background-color: var(--deep-bg);
      color: #ffffff;
      margin: 0;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      font-family: var(--font-display);
    }

    ::selection {
      background-color: #F472B6;
      color: #1a0a10;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 10px;
    }

    ::-webkit-scrollbar-track {
      background: #1a0a10;
    }

    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #3d1a2a 0%, #5a2d3f 100%);
      border-radius: 10px;
      transition: all 0.3s ease;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, #F472B6 0%, #FB7185 100%);
      box-shadow: 0 0 10px rgba(244, 114, 182, 0.5);
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "framer-motion": "https://esm.sh/framer-motion@^12.29.0",
      "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
      "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
      "react/": "https://esm.sh/react@^19.2.3/",
      "react": "https://esm.sh/react@^19.2.3",
      "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
      "react-icons/": "https://esm.sh/react-icons@^5.0.0/",
      "react-icons/io5": "https://esm.sh/react-icons@^5.0.0/io5"
    }
  }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
