<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="cup" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F472B6"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
    <linearGradient id="steam" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#F472B6;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#FBCFE8;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a10"/>
      <stop offset="100%" style="stop-color:#2d1220"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="64" cy="64" r="62" fill="url(#bg)" stroke="url(#cup)" stroke-width="2.5"/>
  <!-- Steam wisps -->
  <path d="M44 42 Q44 32, 50 28 Q56 24, 50 16" fill="none" stroke="url(#steam)" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M58 38 Q58 28, 64 24 Q70 20, 64 12" fill="none" stroke="url(#steam)" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M72 42 Q72 32, 78 28 Q84 24, 78 16" fill="none" stroke="url(#steam)" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Cup body -->
  <path d="M30 52 L30 82 Q30 100, 64 100 Q98 100, 98 82 L98 52 Z" fill="url(#cup)" rx="4"/>
  <!-- Cup highlight -->
  <path d="M38 56 L38 78 Q38 90, 58 92" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="3" stroke-linecap="round"/>
  <!-- Handle -->
  <path d="M98 60 Q116 60, 116 76 Q116 92, 98 92" fill="none" stroke="url(#cup)" stroke-width="6" stroke-linecap="round"/>
  <!-- Saucer -->
  <ellipse cx="64" cy="106" rx="42" ry="8" fill="url(#cup)" opacity="0.7"/>
  <!-- Coffee surface -->
  <ellipse cx="64" cy="56" rx="30" ry="6" fill="#1a0a10" opacity="0.4"/>
</svg>
